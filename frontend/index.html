async function loadComments() {
  const list = document.getElementById("comments-list");
  const countEl = document.getElementById("comment-count");
  try {
    const data = await apiFetch(
      `/api/posts/${state.selectedPost.id}/comment-threads?page=1&size=20&only_author=${state.detailOnlyAuthor ? "true" : "false"}`
    );
    state.commentThreadPage = 1;
    state.commentThreads = (data.items || []).map(t => ({
      ...t,
      replies_page: 1,
    }));
    state.commentThreadHasMore = !!data.has_more;
    countEl.textContent = state.detailOnlyAuthor
      ? `${Number(data.total_visible_comments || 0)}/${Number(data.total_all_comments || 0)}`
      : String(Number(data.total_all_comments || 0));
    renderCommentThreads();
  } catch(e) {
    list.innerHTML = `<div class="empty-state" style="color:var(--danger)">${e.message}</div>`;
  }
}

function renderCommentThreads() {
  const list = document.getElementById("comments-list");
  const DEFAULT_CHILDREN_COLLAPSE = 3;
  if (!list) return;
  if (!state.commentThreads.length) {
    list.innerHTML = `<div class="empty-state">${state.detailOnlyAuthor ? "楼主暂未回复，已切到“只看楼主”" : "还没有回复，来说两句吧 ✍️"}</div>`;
    const lm = document.getElementById("btn-load-more-comments");
    if (lm) lm.style.display = "none";
    return;
  }

  const allComments = [];
  state.commentThreads.forEach(t => {
    if (t.root) allComments.push(t.root);
    (t.replies || []).forEach(r => allComments.push(r));
  });
  state.comments = allComments;

  const renderCommentRow = (c, floor, isChild = false) => `
    <div class="${isChild ? "comment-child-item" : "comment-item"}" data-comment-id="${c.id}" style="animation-delay:${floor*40}ms">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        ${avatarHTML(c.id * 3, c.anon_name, 24)}
        <span style="font-size:13px;font-weight:600">${c.anon_name}</span>
        <span style="font-size:12px;color:var(--text3)">#${floor}</span>
        ${c.is_author ? `<span style="font-size:12px;color:var(--accent)">楼主</span>` : ""}
        <span style="font-size:12px;color:var(--text3);margin-left:auto">${timeAgo(c.created_at)}</span>
      </div>
      ${renderCommentBodyHTML(c.content)}
      <div class="post-actions" style="padding-left:32px;margin-top:8px">
        <button class="action-btn ${c.is_liked?"liked":""}" data-like-comment="${c.id}">
          ${c.is_liked?"❤️":"🤍"} <span>${c.like_count}</span>
        </button>
        <button class="action-btn" data-reply-comment="${c.id}">↩ 回复</button>
        <button class="action-btn warn" data-report-comment="${c.id}">🚩 举报</button>
      </div>
    </div>
  `;

  let floor = 0;
  list.innerHTML = state.commentThreads.map(thread => {
    const root = thread.root;
    floor += 1;
    const rootHtml = renderCommentRow(root, floor, false);
    const allChildren = thread.replies || [];
    const expanded = !!state.commentThreadExpanded[root.id];
    const visibleChildren = expanded ? allChildren : allChildren.slice(0, DEFAULT_CHILDREN_COLLAPSE);
    const children = visibleChildren.map(child => {
      floor += 1;
      return renderCommentRow(child, floor, true);
    }).join("");
    const childWrap = children ? `<div class="comment-children">${children}</div>` : "";
    const hiddenCount = Math.max(0, allChildren.length - visibleChildren.length);
    const toggleHtml = allChildren.length > DEFAULT_CHILDREN_COLLAPSE
      ? `<button class="comment-thread-toggle" data-toggle-thread="${root.id}">
          ${hiddenCount > 0 ? `展开 ${hiddenCount} 条回复` : "收起回复"}
        </button>`
      : "";
    const loadMoreRepliesHtml = expanded && thread.has_more_replies
      ? `<button class="comment-thread-toggle" data-load-replies-root="${root.id}">加载更多回复</button>`
      : "";
    return `${rootHtml}${childWrap}${toggleHtml}${loadMoreRepliesHtml}`;
  }).join("");

  const lm = document.getElementById("btn-load-more-comments");
  if (lm) {
    lm.style.display = state.commentThreadHasMore ? "inline-block" : "none";
    lm.disabled = !!state.commentThreadLoadingMore;
    lm.textContent = state.commentThreadLoadingMore ? "加载中..." : "加载更多评论";
  }

  bindCommentActions();
  if (Number.isFinite(state.pendingCommentId)) {
    const target = list.querySelector(`[data-comment-id="${state.pendingCommentId}"]`);
    if (target) {
      const pendingId = state.pendingCommentId;
      state.pendingCommentId = null;
      target.style.background = "rgba(166,27,41,0.06)";
      target.style.borderRadius = "8px";
      target.scrollIntoView({ behavior: "smooth", block: "center" });
      setTimeout(() => {
        target.style.background = "";
        target.style.borderRadius = "";
      }, 1600);
    }
  }
}

async function loadMoreRootThreads() {
  if (state.commentThreadLoadingMore || !state.commentThreadHasMore) return;
  state.commentThreadLoadingMore = true;
  renderCommentThreads();
  try {
    const nextPage = state.commentThreadPage + 1;
    const data = await apiFetch(
      `/api/posts/${state.selectedPost.id}/comment-threads?page=${nextPage}&size=20&only_author=${state.detailOnlyAuthor ? "true" : "false"}`
    );
    const items = (data.items || []).map(t => ({ ...t, replies_page: 1 }));
    state.commentThreads = state.commentThreads.concat(items);
    state.commentThreadPage = nextPage;
    state.commentThreadHasMore = !!data.has_more;
  } catch (e) {
    showToast(e.message || "加载更多评论失败");
  } finally {
    state.commentThreadLoadingMore = false;
    renderCommentThreads();
  }
}

async function loadMoreReplies(rootId) {
  const thread = state.commentThreads.find(t => Number(t.root?.id) === Number(rootId));
  if (!thread || !thread.has_more_replies) return;
  const nextPage = Number(thread.replies_page || 1) + 1;
  try {
    const data = await apiFetch(
      `/api/posts/${state.selectedPost.id}/comment-threads/${rootId}/replies?page=${nextPage}&size=20&only_author=${state.detailOnlyAuthor ? "true" : "false"}`
    );
    const old = Array.isArray(thread.replies) ? thread.replies : [];
    const merged = old.concat(data.items || []);
    thread.replies = merged;
    thread.replies_page = nextPage;
    thread.loaded_replies = merged.length;
    thread.total_replies = Number(data.total || thread.total_replies || merged.length);
    thread.has_more_replies = !!data.has_more;
    renderCommentThreads();
  } catch (e) {
    showToast(e.message || "加载更多回复失败");
  }
}

function bindCommentActions() {
  const list = document.getElementById("comments-list");
  if (!list) return;

  list.querySelectorAll("[data-toggle-thread]").forEach(btn => {
    btn.addEventListener("click", () => {
      const rid = parseInt(btn.dataset.toggleThread || "", 10);
      if (!Number.isFinite(rid)) return;
      state.commentThreadExpanded[rid] = !state.commentThreadExpanded[rid];
      renderCommentThreads();
    });
  });

  list.querySelectorAll("[data-load-replies-root]").forEach(btn => {
    btn.addEventListener("click", () => {
      const rid = parseInt(btn.dataset.loadRepliesRoot || "", 10);
      if (!Number.isFinite(rid)) return;
      loadMoreReplies(rid);
    });
  });

  list.querySelectorAll("[data-like-comment]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const id = parseInt(btn.dataset.likeComment);
      try {
        const data = await apiFetch(`/api/posts/comments/${id}/like`, { method: "POST" });
        const c = state.comments.find(x => x.id === id);
        if (c) {
          c.is_liked = data.liked;
          c.like_count = data.like_count;
        }
        btn.classList.toggle("liked", data.liked);
        btn.innerHTML = `${data.liked ? "❤️" : "🤍"} <span>${data.like_count}</span>`;
      } catch (e) { alert(e.message); }
    });
  });

  list.querySelectorAll("[data-report-comment]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const id = parseInt(btn.dataset.reportComment);
      const reason = prompt("请简要说明举报原因（可留空）") || "";
      try {
        const data = await apiFetch(`/api/posts/comments/${id}/report`, { method: "POST", body: { reason } });
        alert(data.message || "举报已提交");
      } catch (e) { alert(e.message); }
    });
  });

  list.querySelectorAll("[data-reply-comment]").forEach(btn => {
    btn.addEventListener("click", () => {
      replyTargetCommentId = parseInt(btn.dataset.replyComment);
      const target = state.comments.find(x => x.id === replyTargetCommentId);
      const prefix = buildReplyPrefix(target || {});
      replyTargetPreview = {
        anon_name: String(target?.anon_name || ""),
        excerpt: makeReplyExcerpt(target?.content || ""),
        prefix,
      };
      const hint = document.getElementById("reply-hint");
      if (hint) {
        hint.style.display = "";
        hint.innerHTML = `正在回复 #${replyTargetCommentId}${replyTargetPreview.anon_name ? ` · ${escapeHTML(replyTargetPreview.anon_name)}` : ""} <button class="resend-btn" id="btn-cancel-reply" style="margin-left:8px">取消</button>`;
        const cancelReplyBtn = document.getElementById("btn-cancel-reply");
        if (cancelReplyBtn) {
          cancelReplyBtn.addEventListener("click", () => {
            const input = document.getElementById("comment-input");
            if (input && replyTargetPreview?.prefix && String(input.value || "").startsWith(replyTargetPreview.prefix)) {
              input.value = String(input.value || "").slice(replyTargetPreview.prefix.length);
            }
            replyTargetCommentId = null;
            replyTargetPreview = null;
            hint.style.display = "none";
          });
        }
      }
      const input = document.getElementById("comment-input");
      if (input) {
        let val = String(input.value || "");
        if (replyTargetPreview?.prefix) {
          if (val.startsWith("【引用|") && val.includes("\n")) {
            val = val.slice(val.indexOf("\n") + 1);
          }
          input.value = replyTargetPreview.prefix + val;
        }
        input.focus();
        input.selectionStart = input.value.length;
        input.selectionEnd = input.value.length;
      }
    });
  });
}

async function submitComment() {
  const input = document.getElementById("comment-input");
  const content = input.value.trim();
  if (!content) return;
  if (replyTargetCommentId && replyTargetPreview?.prefix && content.startsWith(replyTargetPreview.prefix)) {
    const body = content.slice(replyTargetPreview.prefix.length).trim();
    if (!body) {
      showToast("回复内容不能为空");
      input.focus();
      return;
    }
  }
  const btn = document.getElementById("btn-send-comment");
  btn.disabled = true; btn.textContent = "...";
  try {
    await apiFetch(`/api/posts/${state.selectedPost.id}/comments`, {
      method:"POST",
      body:{content, parent_id: replyTargetCommentId}
    });
    localStorage.removeItem(getDraftKeyForComment(state.selectedPost.id));
    input.value = "";
    replyTargetCommentId = null;
    replyTargetPreview = null;
    const hint = document.getElementById("reply-hint");
    if (hint) hint.style.display = "none";
    await loadComments();
    state.selectedPost.comment_count = Number(state.selectedPost.comment_count || 0) + 1;
    const inList = state.posts.find(x => x.id === state.selectedPost.id);
    if (inList) inList.comment_count = state.selectedPost.comment_count;
    const detailCommentCount = document.getElementById("detail-comment-count");
    if (detailCommentCount) detailCommentCount.textContent = String(state.selectedPost.comment_count);
    showToast("评论已发布");
  } catch(e) {
    alert(moderationFriendlyMessage(e.message));
  }
  btn.disabled = false; btn.textContent = "发送";
}

// ---- ADMIN PANEL ----
async function showAdminPanel() {
  if (!state.isAdmin) return;
  const root = document.getElementById("modal-root");
  root.innerHTML = `
    <div class="modal-overlay" id="admin-overlay">
      <div class="modal-content" id="admin-body" style="max-width:760px">
        <div class="modal-title"><span>🛠 管理面板</span><button class="modal-close" id="admin-close">✕</button></div>
        <div class="tab-bar">
          <button class="tab-btn active" data-admin-tab="reports">举报队列</button>
          <button class="tab-btn" data-admin-tab="hits">敏感命中</button>
          <button class="tab-btn" data-admin-tab="appeals">申诉处理</button>
        </div>
        <div id="admin-content" style="max-height:55vh;overflow:auto;padding-top:8px">加载中...</div>
      </div>
    </div>`;

  const close = () => { root.innerHTML = ""; };
  document.getElementById("admin-close").addEventListener("click", close);
  document.getElementById("admin-overlay").addEventListener("click", (e) => {
    if (e.target.id === "admin-overlay") close();
  });
  document.getElementById("admin-body").addEventListener("click", e => e.stopPropagation());

  const loadTab = async (tab) => {
    const box = document.getElementById("admin-content");
    box.innerHTML = "加载中...";
    try {
      if (tab === "reports") {
        const rows = await apiFetch("/api/admin/reports?page=1&size=50");
        if (!rows.length) { box.innerHTML = `<div class="empty-state">暂无举报</div>`; return; }
        box.innerHTML = rows.map(r => `
          <div class="comment-item">
            <div style="font-size:13px;color:var(--text2)">#${r.id} ${r.target_type}:${r.target_id} · 举报人:${r.report_user_id}</div>
            <div style="font-size:14px;margin:6px 0">${escapeHTML(r.reason || "（无理由）")}</div>
            <div class="post-actions">
              <button class="action-btn warn" data-report-resolve="${r.id}" data-report-action="warn_author">⚠️ 警告作者</button>
              <button class="action-btn warn" data-report-resolve="${r.id}" data-report-action="ignore">✅ 结案（不处罚）</button>
              ${r.target_type === "post" ? `<button class="action-btn warn" data-report-resolve="${r.id}" data-report-action="delete_post">🗑 删帖</button>` : ""}
              ${r.target_type === "post" ? `<button class="action-btn warn" data-report-resolve="${r.id}" data-report-action="ban_author">⛔ 禁言作者</button>` : ""}
              ${r.target_type === "comment" ? `<button class="action-btn warn" data-report-resolve="${r.id}" data-report-action="delete_comment">🗑 删评论</button>` : ""}
              ${r.target_type === "comment" ? `<button class="action-btn warn" data-report-resolve="${r.id}" data-report-action="ban_author">⛔ 禁言作者</button>` : ""}
            </div>
          </div>
        `).join("");
        bindAdminActions();
      } else if (tab === "hits") {
        const rows = await apiFetch("/api/admin/moderation-hits?page=1&size=50");
        if (!rows.length) { box.innerHTML = `<div class="empty-state">暂无命中记录</div>`; return; }
        box.innerHTML = rows.map(r => `
          <div class="comment-item">
            <div style="font-size:13px;color:var(--text2)">#${r.id} ${escapeHTML(r.scene)} · user:${r.user_id ?? "-"}</div>
            <div style="font-size:14px;margin:6px 0">${escapeHTML(r.content_preview || "")}</div>
            <div style="font-size:12px;color:var(--text3)">${escapeHTML(r.reason || "")}</div>
          </div>
        `).join("");
      } else {
        const rows = await apiFetch("/api/admin/appeals?status=pending&page=1&size=50");
        if (!rows.length) { box.innerHTML = `<div class="empty-state">暂无待处理申诉</div>`; return; }
        box.innerHTML = rows.map(a => `
          <div class="comment-item">
            <div style="font-size:13px;color:var(--text2)">申诉#${a.id} · 用户:${a.user_id} · 记录:${a.moderation_log_id} · ${timeAgo(a.created_at)}</div>
            <div style="font-size:14px;margin:6px 0">${escapeHTML(a.content || "")}</div>
            <div class="post-actions">
              <button class="action-btn warn" data-appeal-resolve="${a.id}" data-appeal-status="approved">✅ 通过申诉</button>
              <button class="action-btn warn" data-appeal-resolve="${a.id}" data-appeal-status="rejected">❌ 驳回申诉</button>
            </div>
          </div>
        `).join("");
        bindAdminActions();
      }
    } catch (e) {
      box.innerHTML = `<div class="empty-state" style="color:var(--danger)">${escapeHTML(e.message)}</div>`;
    }
  };

  document.querySelectorAll("[data-admin-tab]").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("[data-admin-tab]").forEach(x => x.classList.remove("active"));
      btn.classList.add("active");
      loadTab(btn.dataset.adminTab);
    });
  });

  loadTab("reports");
}

function bindAdminActions() {
  document.querySelectorAll("[data-report-resolve]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const reportId = parseInt(btn.dataset.reportResolve || "", 10);
      const action = String(btn.dataset.reportAction || "").trim();
      if (!Number.isFinite(reportId) || !action) return;

      const actionLabelMap = {
        warn_author: "警告作者",
        ignore: "结案（不处罚）",
        delete_post: "删帖",
        delete_comment: "删评论",
        ban_author: "禁言作者",
      };
      const actionLabel = actionLabelMap[action] || action;
      if (!confirm(`确认执行：${actionLabel}？`)) return;

      const reasonDefaultMap = {
        warn_author: "存在不当言论，已发出警告",
        ignore: "核查后暂未发现违规",
        delete_post: "内容违规，已删除帖子",
        delete_comment: "内容违规，已删除评论",
        ban_author: "多次违规，已禁言账号",
      };
      const reason = (prompt("处理备注（管理员留档，可留空）", reasonDefaultMap[action] || "") || "").trim();

      const feedbackDefaultMap = {
        warn_author: "感谢举报，已警告发布者并记录在案。",
        ignore: "感谢举报，已核查，暂未达到处罚标准，我们会持续关注。",
        delete_post: "感谢举报，已核查并删除违规帖子。",
        delete_comment: "感谢举报，已核查并删除违规评论。",
        ban_author: "感谢举报，已核查并禁言该账号。",
      };
      const feedback = (prompt("给举报者的处理反馈（必填）", feedbackDefaultMap[action] || "") || "").trim();
      if (!feedback) {
        alert("反馈内容不能为空");
        return;
      }

      try {
        const data = await apiFetch(`/api/admin/reports/${reportId}/resolve`, {
          method: "POST",
          body: { action, reason, feedback },
        });
        showToast(data.message || "已处理并反馈举报人");
        btn.closest(".comment-item")?.remove();
      } catch (e) {
        alert(e.message);
      }
    });
  });

  document.querySelectorAll("[data-admin-del-post]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const id = parseInt(btn.dataset.adminDelPost);
      if (!confirm(`确认删除帖子（${formatHoleNo(id)}）?`)) return;
      const reason = (prompt("请输入删除原因（将通知当事人）", "违反社区规范") || "").trim();
      try {
        await apiFetch(`/api/admin/posts/${id}`, { method: "DELETE", body: { reason } });
        btn.closest(".comment-item")?.remove();
      } catch (e) { alert(e.message); }
    });
  });
  document.querySelectorAll("[data-admin-ban-post-author]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const id = parseInt(btn.dataset.adminBanPostAuthor);
      if (!confirm(`确认禁言帖子作者（${formatHoleNo(id)}）?`)) return;
      const reason = (prompt("请输入禁言原因（将通知当事人）", "多次违规发言") || "").trim();
      try {
        await apiFetch(`/api/admin/posts/${id}/ban-author`, { method: "POST", body: { reason } });
        alert("已禁言作者");
      } catch (e) { alert(e.message); }
    });
  });
  document.querySelectorAll("[data-admin-del-comment]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const id = parseInt(btn.dataset.adminDelComment);
      if (!confirm(`确认删除评论 #${id} ?`)) return;
      const reason = (prompt("请输入删除原因（将通知当事人）", "评论违规") || "").trim();
      try {
        await apiFetch(`/api/admin/comments/${id}`, { method: "DELETE", body: { reason } });
        btn.closest(".comment-item")?.remove();
      } catch (e) { alert(e.message); }
    });
  });
  document.querySelectorAll("[data-appeal-resolve]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const id = parseInt(btn.dataset.appealResolve, 10);
      const status = btn.dataset.appealStatus;
      const reply = (prompt("请输入给用户的处理回复", status === "approved" ? "已复核，申诉通过，后续将优化规则。" : "已复核，维持原处理。") || "").trim();
      try {
        await apiFetch(`/api/admin/appeals/${id}/resolve`, {
          method: "POST",
          body: { status, admin_reply: reply },
        });
        btn.closest(".comment-item")?.remove();
      } catch (e) {
        alert(e.message);
      }
    });
  });
}

function openImageViewer(urls, startIndex = 0) {
  const list = (Array.isArray(urls) ? urls : []).filter(Boolean);
  if (!list.length) return;
  state.imageViewer = {
    open: true,
    urls: list,
    index: Math.max(0, Math.min(startIndex, list.length - 1)),
    zoom: 1,
  };
  renderImageViewer();
}

function closeImageViewer() {
  state.imageViewer = { open: false, urls: [], index: 0, zoom: 1 };
  const root = document.getElementById("img-viewer-root");
  if (root) root.remove();
}

function renderImageViewer() {
  const v = state.imageViewer;
  if (!v.open || !v.urls.length) return;
  let root = document.getElementById("img-viewer-root");
  if (!root) {
    root = document.createElement("div");
    root.id = "img-viewer-root";
    document.body.appendChild(root);
  }
  root.innerHTML = `
    <div class="img-viewer" id="img-viewer-overlay">
      <div class="img-viewer-stage" id="img-viewer-stage">
        <button class="img-viewer-btn img-viewer-close" id="img-viewer-close">关闭</button>
        ${v.urls.length > 1 ? `<button class="img-viewer-nav img-viewer-prev" id="img-viewer-prev">‹</button>` : ""}
        <img class="img-viewer-img" id="img-viewer-img" src="${escapeAttr(v.urls[v.index])}" style="transform:scale(${v.zoom})">
        ${v.urls.length > 1 ? `<button class="img-viewer-nav img-viewer-next" id="img-viewer-next">›</button>` : ""}
        <div class="img-viewer-meta">${v.index + 1} / ${v.urls.length} · 滚轮缩放</div>
      </div>
    </div>`;

  const overlay = document.getElementById("img-viewer-overlay");
  const stage = document.getElementById("img-viewer-stage");
  const closeBtn = document.getElementById("img-viewer-close");
  const prevBtn = document.getElementById("img-viewer-prev");
  const nextBtn = document.getElementById("img-viewer-next");

  closeBtn?.addEventListener("click", closeImageViewer);
  overlay?.addEventListener("click", (e) => {
    if (e.target.id === "img-viewer-overlay") closeImageViewer();
  });
  stage?.addEventListener("click", (e) => e.stopPropagation());

  prevBtn?.addEventListener("click", () => {
    state.imageViewer.index = (state.imageViewer.index - 1 + state.imageViewer.urls.length) % state.imageViewer.urls.length;
    state.imageViewer.zoom = 1;
    renderImageViewer();
  });
  nextBtn?.addEventListener("click", () => {
    state.imageViewer.index = (state.imageViewer.index + 1) % state.imageViewer.urls.length;
    state.imageViewer.zoom = 1;
    renderImageViewer();
  });

  stage?.addEventListener("wheel", (e) => {
    e.preventDefault();
    const step = e.deltaY > 0 ? -0.1 : 0.1;
    state.imageViewer.zoom = Math.max(0.6, Math.min(3, state.imageViewer.zoom + step));
    const img = document.getElementById("img-viewer-img");
    if (img) img.style.transform = `scale(${state.imageViewer.zoom})`;
  }, { passive: false });

  let touchStartX = 0;
  stage?.addEventListener("touchstart", (e) => {
    if (!e.touches?.length) return;
    touchStartX = e.touches[0].clientX;
  }, { passive: true });
  stage?.addEventListener("touchend", (e) => {
    if (!e.changedTouches?.length) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) < 45 || state.imageViewer.urls.length <= 1) return;
    if (dx > 0) {
      state.imageViewer.index = (state.imageViewer.index - 1 + state.imageViewer.urls.length) % state.imageViewer.urls.length;
    } else {
      state.imageViewer.index = (state.imageViewer.index + 1) % state.imageViewer.urls.length;
    }
    state.imageViewer.zoom = 1;
    renderImageViewer();
  }, { passive: true });
}

async function showAppealCenter() {
  const root = document.getElementById("modal-root");
  root.innerHTML = `
    <div class="modal-overlay" id="appeal-overlay">
      <div class="modal-content" id="appeal-body" style="max-width:760px">
        <div class="modal-title"><span>🧾 申诉中心</span><button class="modal-close" id="appeal-close">✕</button></div>
        <div class="form-hint">如你认为管理员处理有误，可针对治理记录发起申诉。</div>
        <div id="appeal-events" style="max-height:180px;overflow:auto;margin-top:8px"></div>
        <div style="margin-top:12px">
          <label class="form-label">选择治理记录 ID（仅你的）</label>
          <input id="appeal-event-id" class="form-input" placeholder="例如：23">
        </div>
        <div style="margin-top:8px">
          <label class="form-label">申诉说明</label>
          <textarea id="appeal-content" class="form-textarea" placeholder="请客观说明申诉理由（至少5字）"></textarea>
        </div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="btn-primary" id="appeal-submit">提交申诉</button>
          <button class="btn-outline" id="appeal-refresh">刷新记录</button>
        </div>
        <div id="appeal-msg" style="margin-top:8px"></div>
        <hr style="border:none;border-top:1px solid var(--border);margin:14px 0">
        <div style="font-size:13px;color:var(--text2);margin-bottom:8px">我的申诉进度</div>
        <div id="appeal-list" style="max-height:190px;overflow:auto"></div>
      </div>
    </div>`;

  const close = () => (root.innerHTML = "");
  document.getElementById("appeal-close").addEventListener("click", close);
  document.getElementById("appeal-overlay").addEventListener("click", (e) => { if (e.target.id === "appeal-overlay") close(); });
  document.getElementById("appeal-body").addEventListener("click", (e) => e.stopPropagation());

  const load = async () => {
    const eventBox = document.getElementById("appeal-events");
    const listBox = document.getElementById("appeal-list");
    eventBox.innerHTML = "加载中...";
    listBox.innerHTML = "加载中...";
    try {
      const [events, appeals] = await Promise.all([
        apiFetch("/api/auth/moderation-events?page=1&size=30"),
        apiFetch("/api/auth/appeals?page=1&size=30"),
      ]);
      eventBox.innerHTML = events.length ? events.map(e => `
        <div class="comment-item" style="padding:10px 12px">
          <div style="font-size:13px;color:var(--text2)">ID ${e.id} · ${escapeHTML(e.scene)} · ${timeAgo(e.created_at)}</div>
          <div style="font-size:14px;margin-top:4px">${escapeHTML(e.reason || "（无详细原因）")}</div>
        </div>
      `).join("") : `<div class="empty-state">暂无治理记录</div>`;
      listBox.innerHTML = appeals.length ? appeals.map(a => `
        <div class="comment-item" style="padding:10px 12px">
          <div style="font-size:13px;color:var(--text2)">申诉 #${a.id} · 记录ID ${a.moderation_log_id} · ${timeAgo(a.created_at)}</div>
          <div style="font-size:14px;margin-top:4px">${escapeHTML(a.content || "")}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:4px">状态：${escapeHTML(a.status)} ${a.admin_reply ? "· 回复：" + escapeHTML(a.admin_reply) : ""}</div>
        </div>
      `).join("") : `<div class="empty-state">暂无申诉</div>`;
    } catch (e) {
      eventBox.innerHTML = `<div class="empty-state" style="color:var(--danger)">${escapeHTML(e.message)}</div>`;
      listBox.innerHTML = "";
    }
  };

  document.getElementById("appeal-refresh").addEventListener("click", load);
  document.getElementById("appeal-submit").addEventListener("click", async () => {
    const msg = document.getElementById("appeal-msg");
    const eventId = parseInt(document.getElementById("appeal-event-id").value || "", 10);
    const content = (document.getElementById("appeal-content").value || "").trim();
    msg.innerHTML = "";
    if (!Number.isFinite(eventId) || eventId <= 0) {
      msg.innerHTML = `<div class="form-error">请输入有效治理记录 ID</div>`;
      return;
    }
    if (content.length < 5) {
      msg.innerHTML = `<div class="form-error">申诉内容至少 5 个字符</div>`;
      return;
    }
    try {
      await apiFetch("/api/auth/appeals", {
        method: "POST",
        body: { moderation_log_id: eventId, content },
      });
      msg.innerHTML = `<div class="form-success">申诉已提交</div>`;
      document.getElementById("appeal-content").value = "";
      await load();
    } catch (e) {
      msg.innerHTML = `<div class="form-error">${escapeHTML(e.message)}</div>`;
    }
  });

  await load();
}
